CONFIG_NCS_SAMPLES_DEFAULTS=y

# Deferred logging helps improve LPN power consumption
# when friendship is established.
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048

# General configuration
CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="BLE Env Monitor"
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_IDLE_STACK_SIZE=2048
CONFIG_ISR_STACK_SIZE=4096
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_NVS_LOOKUP_CACHE=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS_NAME_CACHE=y
CONFIG_HWINFO=y
CONFIG_DK_LIBRARY=y
CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x8000
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Temperature sensor
CONFIG_SENSOR=y
CONFIG_TEMP_NRF5=y

# ADC for battery monitoring
CONFIG_ADC=y

# Bluetooth configuration for advertising
CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="BLE Env Monitor"
CONFIG_BT_L2CAP_TX_BUF_COUNT=8
CONFIG_BT_OBSERVER=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_SETTINGS=y

# Enable Bluetooth security features for production
CONFIG_BT_CTLR_LE_ENC=y
CONFIG_BT_PHY_UPDATE=n
CONFIG_BT_CTLR_CHAN_SEL_2=n
CONFIG_BT_CTLR_MIN_USED_CHAN=n
CONFIG_BT_CTLR_PRIVACY=y

# BLE Advertising configuration - use legacy advertising for nRF52832
# CONFIG_BT_EXT_ADV=y

# BLE Services
CONFIG_BT_BAS=y
CONFIG_BT_BAS_BLS=y

# Device Information Service (DIS)
CONFIG_BT_DIS=y
CONFIG_BT_DIS_MANUF_NAME=y
CONFIG_BT_DIS_MANUF_NAME_STR="Nordic Semiconductor"
CONFIG_BT_DIS_MODEL_NUMBER=y
CONFIG_BT_DIS_MODEL_NUMBER_STR="Thingy:52"
CONFIG_BT_DIS_SERIAL_NUMBER=y
CONFIG_BT_DIS_SERIAL_NUMBER_STR="ENV001"
CONFIG_BT_DIS_FW_REV=y
CONFIG_BT_DIS_FW_REV_STR="1.0.0"
CONFIG_BT_DIS_HW_REV=y
CONFIG_BT_DIS_HW_REV_STR="1.0"
CONFIG_BT_DIS_SW_REV=y
CONFIG_BT_DIS_SW_REV_STR="Zephyr"

# Environmental sensor sampling intervals (ultra-low power)
# Temperature, humidity, pressure, CO2, VOC: every 15 minutes
# Battery level: every 6 hours
# This configuration targets weeks to months of battery life

# === POWER MANAGEMENT ===
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# Logging optimization to prevent message drops
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_BT_LOG_LEVEL_INF=y

# Stack protection
CONFIG_STACK_CANARIES=y

# Use dedicated BT RX workqueue
CONFIG_BT_RECV_WORKQ_BT=y

# Debug
CONFIG_DEBUG=y
