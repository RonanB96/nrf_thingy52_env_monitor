# Thingy52 Mesh-specific configuration
# Board-specific mesh overrides for ultra-low power

# === THINGY52 ULTRA-LOW POWER LPN SETTINGS (More aggressive than main) ===
# Override: More aggressive than main (30→50)
CONFIG_BT_MESH_LPN_SCAN_LATENCY=50
# Override: Use shorter timeout for initial testing (within valid range 10-244735)
CONFIG_BT_MESH_LPN_POLL_TIMEOUT=30000

# === THINGY52 MESH BUFFER OPTIMIZATION ===
# Override: Reduce from 8 to 2 for power savings
CONFIG_BT_L2CAP_TX_BUF_COUNT=2
