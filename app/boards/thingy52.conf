# Thingy:52 Board-Specific Low Power Configuration
# Board-specific overrides for ultra-low power environmental monitoring
# Duplicates from prj.conf are removed - only Thingy52-specific settings remain

# === THINGY52 SENSOR CONFIGURATION ===
CONFIG_I2C=y
CONFIG_HTS221=y        # Temperature and humidity sensor (Thingy52 specific)
CONFIG_LPS22HB=y       # Pressure sensor (Thingy52 specific)
CONFIG_CCS811=y        # Gas sensor (Thingy52 specific)

# === SENSOR POWER OPTIMIZATION ===
# Use lowest available sampling rates to minimize power consumption
# Note: Zephyr drivers don't support true one-shot mode, use lowest rates
CONFIG_HTS221_ODR="1"
CONFIG_LPS22HB_SAMPLING_RATE=1
CONFIG_SENSOR_ENV_INTERVAL_SEC=900
CONFIG_SENSOR_AIR_QUALITY_DIVISOR=2

# # === CCS811 AIR QUALITY SENSOR OPTIMIZATION ===
# # Drive Mode 0 (IDLE) for on-demand readings - saves significant power
# # CCS811 Air Quality Sensor Configuration
# Use Mode 1: 1-second measurement intervals for low power operation
CONFIG_CCS811_DRIVE_MODE_1=y    # Enable 1-second continuous mode

# Enable interrupt-based CCS811 data ready triggers
CONFIG_CCS811_TRIGGER_GLOBAL_THREAD=y
CONFIG_TEMP_NRF5=n     # Disable generic temp sensor (conflicts with HTS221)

# # Initialize CCS regulator after SX1509B
# CONFIG_REGULATOR_FIXED_INIT_PRIORITY=70

# === THINGY52 DEVICE NAMING ===
CONFIG_BT_DEVICE_NAME="Thingy52 BLE Monitor"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=64

# === THINGY52 MEMORY OPTIMIZATION (Override main config for limited RAM) ===
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
# Override: Reduce from 320 to 320
CONFIG_IDLE_STACK_SIZE=320
# Override: Reduce from 4096 to 512
CONFIG_ISR_STACK_SIZE=512
CONFIG_HEAP_MEM_POOL_SIZE=4096

# === THINGY52 BLE BUFFER OPTIMIZATION ===
# Override: Reduce from 8 to 4 for advertising
CONFIG_BT_L2CAP_TX_BUF_COUNT=4

# === THINGY52 POWER SAVINGS ===
CONFIG_DK_LIBRARY=n    # Override: Disable DK board features (not needed on Thingy52)
CONFIG_LED=n           # Disable LEDs completely (no user LEDs needed)

# === DISABLE UNUSED NRF FEATURES (BLE-only project) ===
CONFIG_NRF_MODEM_LIB=n  # Disable modem library (LTE/GPS not needed)
CONFIG_OPENTHREAD=n     # Disable Thread networking (BLE only)
# GPIO Configuration for Thingy:52 hardware control
CONFIG_GPIO=y          # Keep GPIO for sensors and battery monitoring
CONFIG_GPIO_HOGS=y     # Enable GPIO HOG support for P0.16 SX1509B reset
CONFIG_PWM=n           # Disable PWM completely
CONFIG_SPI=n           # Disable SPI completely
# CONFIG_UART_CONSOLE=n  # Disable UART console for power savings
# CONFIG_SERIAL=n        # Disable serial completely
# CONFIG_CONSOLE=n       # Disable console
# CONFIG_STDOUT_CONSOLE=n # Disable stdout
# CONFIG_PRINTK=n        # Disable printk for maximum power savings
# CONFIG_EARLY_CONSOLE=n  # Disable early console
# CONFIG_BOOT_BANNER=n   # Disable boot banner

# === THINGY52 CLOCK OPTIMIZATION ===
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y    # Use external 32kHz crystal (more accurate, lower power)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=y  # 500ppm accuracy sufficient

CONFIG_PM=n # Not valid for nrf52832

# === THINGY52 LOGGING OPTIMIZATION ===
CONFIG_SENSOR_LOG_LEVEL_INF=y
# Global warning level for power savings
CONFIG_LOG_DEFAULT_LEVEL=3
