manifest:
  defaults:
    remote: ncs

  remotes:
    - name: ncs
      url-base: https://github.com/nrfconnect
    - name: ronan
      url-base: https://github.com/RonanB96
    - name: zephyrproject
      url-base: https://github.com/zephyrproject-rtos

  projects:
    # Custom Zephyr with CCS811 fixes and hal_nordic support
    - name: zephyr
      remote: ronan
      repo-path: sdk-zephyr
      path: modules/zephyr
      revision: ccs811_updates
      west-commands: scripts/west-commands.yml
      import:
        # Import only essential modules for Nordic nRF52832 BLE development
        file: west.yml
        name-allowlist:
          # Essential Nordic HAL for nRF52832
          - hal_nordic
          # Essential ST HAL for HTS221, LPS22HB sensors
          - hal_st
          # Essential modules for sensors and basic functionality
          - cmsis
          - fatfs
          - tinycrypt
          # Optional but useful for debugging
          - segger

    # Minimal NCS for samples defaults and DK library
    - name: sdk-nrf
      remote: ncs
      path: nrf
      revision: v3.0.2
      import:
        # Import minimal NCS components
        file: west.yml
        path-prefix: modules
        # Only include essential Nordic libraries
        name-allowlist:
          # Skip matter entirely for size optimization
          # Include essential Nordic libraries for nRF52832 BLE
          - mcuboot
          - nrfxlib

  self:
    path: app
