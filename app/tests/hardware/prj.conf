# ZTEST framework
CONFIG_ZTEST=y
CONFIG_ZTEST_VERBOSE_OUTPUT=y

# Logging via UART (needed to see ZTEST output)
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y

# Floating point support for sensor_value_to_double()
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Hardware drivers — specific drivers auto-selected by DT status=okay nodes
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_ADC=y

# HTS221 DRDY trigger via GPIO interrupt (exercises GPIO interrupt path)
CONFIG_HTS221_TRIGGER_GLOBAL_THREAD=y

# Stack / heap sizing
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192
