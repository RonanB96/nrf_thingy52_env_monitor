#
# Hardware test configuration
# This extends the main project configuration for hardware testing
#

# Main project configuration
CONFIG_APPLICATION_WORKQUEUE_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Hardware testing specific configuration
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_RTT=n
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# BLE configuration for connectivity testing
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Thingy:52-HIL"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# BLE advertising configuration
CONFIG_BT_PRIVACY=n
CONFIG_BT_EXT_ADV=n
CONFIG_BT_OBSERVER=n
CONFIG_BT_BROADCASTER=y

# GATT configuration for service testing
CONFIG_BT_GATT_SERVICE_CHANGED=y
CONFIG_BT_GATT_CACHING=y
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y

# Sensor configuration for hardware testing
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_GPIO=y

# ADC for battery monitoring tests
CONFIG_ADC=y

# Settings for persistent configuration
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Power management for power testing
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# Hardware test debug configuration
CONFIG_ASSERT=y
CONFIG_DEBUG_INFO=y