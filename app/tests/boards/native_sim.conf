# Native simulation board configuration for testing
# Minimal configuration for basic unit tests

# Enable mocking support for future expansion
CONFIG_ZTEST_MOCKING=y

# Increase verbosity for test debugging
CONFIG_ZTEST_VERBOSE_OUTPUT=y

# Memory optimizations for simulation
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=16384

# Disable logging to avoid syscall conflicts
CONFIG_LOG=n

# Enable assertions for thorough testing
CONFIG_ASSERT=y

# Disable power management for deterministic testing
CONFIG_PM=n
CONFIG_PM_DEVICE=n