# Native simulation board configuration for testing
# Configuration specific to native_sim platform

# Use external (host) libc for compatibility
CONFIG_EXTERNAL_LIBC=y

# Memory optimizations for simulation
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=16384

# Enable logging with native backend
CONFIG_LOG=y
CONFIG_LOG_BACKEND_NATIVE_POSIX=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Enable assertions for thorough testing
CONFIG_ASSERT=y

# Enable console for test output
CONFIG_CONSOLE=y

# Disable power management for deterministic testing
CONFIG_PM=n
CONFIG_PM_DEVICE=n