# Native simulation board configuration for testing
# This file contains configurations specific to running tests
# on the native_sim board without hardware dependencies

# Disable hardware drivers that aren't available in simulation
CONFIG_SENSOR=n
CONFIG_I2C=n
CONFIG_GPIO=n
CONFIG_ADC=n
CONFIG_SPI=n

# Disable Bluetooth stack for basic unit tests
CONFIG_BT=n

# Enable mocking support for hardware abstractions
CONFIG_ZTEST_MOCKING=y

# Increase verbosity for test debugging
CONFIG_ZTEST_VERBOSE_OUTPUT=y

# Enable console output for test results
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Memory optimizations for simulation
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=16384

# Logging configuration for tests
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=4

# Enable assertions for thorough testing
CONFIG_ASSERT=y
CONFIG_ASSERT_LEVEL=2

# Disable power management for deterministic testing
CONFIG_PM=n
CONFIG_PM_DEVICE=n

# Enable native simulation optimizations
CONFIG_NATIVE_APPLICATION=y