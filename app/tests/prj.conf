# Enable Zephyr Testing Framework
CONFIG_ZTEST=y

# Enable test runner features
CONFIG_ZTEST_VERBOSE_OUTPUT=y
CONFIG_ZTEST_FAIL_FAST=n

# Basic system features needed for tests
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Disable logging to avoid syscall conflicts
CONFIG_LOG=n

# Math support for floating point operations
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Enable assertions in tests
CONFIG_ASSERT=y

# Debug features for test development
CONFIG_DEBUG=y

# Disable userspace to avoid syscall complications
CONFIG_USERSPACE=n