# Enable Zephyr Testing Framework
CONFIG_ZTEST=y
CONFIG_ZTEST_MOCKING=y

# Enable test runner features
CONFIG_ZTEST_VERBOSE_OUTPUT=y
CONFIG_ZTEST_FAIL_FAST=n

# Disable hardware-specific features for testing
CONFIG_BT=n
CONFIG_SENSOR=n
CONFIG_ADC=n
CONFIG_I2C=n
CONFIG_GPIO=n

# Enable native simulation features
CONFIG_NATIVE_APPLICATION=y

# Enable logging for test debugging
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable system features needed for tests
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Flash and settings (for testing storage functionality)
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_SETTINGS=y

# Math support for sensor value calculations
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Enable assertions in tests
CONFIG_ASSERT=y
CONFIG_ASSERT_LEVEL=2

# Kernel features for testing
CONFIG_KERNEL=y
CONFIG_MULTITHREADING=y

# Memory protection disabled for easier testing
CONFIG_USERSPACE=n

# Test-specific optimizations
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_SPEED_OPTIMIZATIONS=n

# Debug features for test development
CONFIG_DEBUG=y
CONFIG_DEBUG_INFO=y