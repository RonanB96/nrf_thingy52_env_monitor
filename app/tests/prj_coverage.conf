# Coverage-optimized test configuration
# This configuration maximizes coverage reporting accuracy

# ZTEST Framework - verbose for coverage correlation
CONFIG_ZTEST=y
CONFIG_ZTEST_VERBOSE_OUTPUT=y
CONFIG_ZTEST_STACK_SIZE=4096

# Use external (host) libc for native_sim
CONFIG_EXTERNAL_LIBC=y

# Explicitly disable userspace and syscalls to avoid conflicts
CONFIG_USERSPACE=n

# Memory management - increased for coverage data
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=8192

# Disable hardware-specific features for testing
CONFIG_BT=n
CONFIG_SENSOR=n
CONFIG_GPIO=n
CONFIG_I2C=n
CONFIG_SPI=n

# Disable power management
CONFIG_PM=n

# Coverage configuration - comprehensive reporting
CONFIG_COVERAGE=y
CONFIG_COVERAGE_GCOV=y
CONFIG_COVERAGE_DUMP=y

# Debug configuration optimized for coverage
CONFIG_DEBUG=y
CONFIG_DEBUG_INFO=y
CONFIG_DEBUG_OPTIMIZATIONS=y

# Disable optimizations that interfere with coverage
CONFIG_NO_OPTIMIZATIONS=y
CONFIG_DEBUG_THREAD_INFO=y

# Enhanced logging for coverage correlation
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_PRINTK=y
CONFIG_LOG_BUFFER_SIZE=2048

# Console configuration for test output
CONFIG_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y

# Timing configuration for deterministic tests
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000