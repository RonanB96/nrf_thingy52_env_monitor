# Integration coverage test for app/src/battery_service.c on native_sim.
#
# Compiles the production battery_service.c against zephyr,adc-emul and
# the standard voltage-divider sensor driver, plus gpio-emul for the
# charge-status pin. No Nordic-specific peripherals.

CONFIG_ZTEST=y
CONFIG_ZTEST_VERBOSE_OUTPUT=y

CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_GPIO=y
CONFIG_GPIO_EMUL=y

CONFIG_ADC=y
CONFIG_ADC_EMUL=y
CONFIG_SENSOR=y

# voltage-divider is a separate Kconfig. Auto-enabled when its compatible
# node is "okay" via Kconfig.defconfig, but make the dependency explicit.
CONFIG_VOLTAGE_DIVIDER=y

CONFIG_BT=n

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=2
