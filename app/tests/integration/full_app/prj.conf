# Integration coverage test for app sensor wrapper sources.
#
# Compiles the upstream HTS221 / LPS22HB / CCS811 sensor drivers against
# in-tree minimal I2C emul backends (see emul/) so the thin app/src
# wrappers (sensor_*_driver.c) can be exercised end-to-end on native_sim.
# This contributes coverage to:
#   - app/src/sensor_hts221_driver.c
#   - app/src/sensor_lps22hb_driver.c
#   - app/src/sensor_ccs811_driver.c

CONFIG_ZTEST=y
CONFIG_ZTEST_VERBOSE_OUTPUT=y

CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=8192

# I2C, GPIO and emulator infrastructure.
CONFIG_I2C=y
CONFIG_I2C_EMUL=y
CONFIG_GPIO=y
CONFIG_GPIO_EMUL=y
CONFIG_EMUL=y

# Real upstream sensor drivers compiled in.
CONFIG_SENSOR=y
CONFIG_HTS221=y
CONFIG_HTS221_TRIGGER_NONE=y
CONFIG_LPS22HB=y
CONFIG_CCS811=y

# Settings backend used by ccs811_driver baseline persistence.
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y

# No BLE in this fixture.
CONFIG_BT=n

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=2
