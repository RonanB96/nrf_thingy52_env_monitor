# Unit test for sensor_manager.h public contract.
# Pure header-only tests — no production .c file linked, no fakes needed.

CONFIG_ZTEST=y
CONFIG_ZTEST_VERBOSE_OUTPUT=y

CONFIG_EXTERNAL_LIBC=y
CONFIG_USERSPACE=n

CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

# Application Kconfig values used by the contract tests.
CONFIG_SENSOR_ENV_INTERVAL_SEC=900
CONFIG_SENSOR_AIR_QUALITY_DIVISOR=2

CONFIG_BT=n
CONFIG_SENSOR=n
CONFIG_GPIO=n
CONFIG_I2C=n
CONFIG_PM=n

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
