# Unit test for ble_battery_service.c — runs on native_sim with FFF fakes
# for battery_service (HAL) and bt_bas (BLE BAS API).

CONFIG_ZTEST=y
CONFIG_ZTEST_VERBOSE_OUTPUT=y

# Use external (host) libc for native_sim
CONFIG_EXTERNAL_LIBC=y

CONFIG_USERSPACE=n

CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096

# Bluetooth APIs are faked at link time — leave the stack disabled.
CONFIG_BT=n
CONFIG_SENSOR=n
CONFIG_GPIO=n
CONFIG_I2C=n
CONFIG_SPI=n
CONFIG_PM=n

# Logging on for diagnostics; immediate mode for ordered output in tests.
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3
