# Unit test for sensor_manager.c — runs on native_sim with FFF fakes for
# the sensor driver wrappers and battery_service. i2c0 uses the
# zephyr,i2c-emul-controller so device_is_ready() returns true and init
# passes the i2c gate.

CONFIG_ZTEST=y
CONFIG_ZTEST_VERBOSE_OUTPUT=y

CONFIG_EXTERNAL_LIBC=y
CONFIG_USERSPACE=n

CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_BT=n

# Real I2C controller (emulated) so device_is_ready(i2c_dev) succeeds.
CONFIG_I2C=y
CONFIG_EMUL=y
CONFIG_I2C_EMUL=y

# Real GPIO emulator for the lps22hb_int phandle resolution.
CONFIG_GPIO=y
CONFIG_GPIO_EMUL=y

# Sensor subsystem disabled — the three sensor drivers are FFF-faked.
CONFIG_SENSOR=n
CONFIG_SPI=n
CONFIG_PM=n

# Settings disabled — sensor_manager.c does not use it directly.

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=2
