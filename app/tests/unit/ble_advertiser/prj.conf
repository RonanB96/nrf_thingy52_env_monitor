# Unit test for app/src/ble_advertiser.c with FFF mocks for the BT host
# and hwinfo APIs. Runs on native_sim. Same pattern as other unit tests
# in this repo (e.g. unit/ess_service): CONFIG_BT=n keeps the BT subsystem
# out of the link; the wrapper symbols are provided by mock_ble.c.

CONFIG_ZTEST=y
CONFIG_ZTEST_VERBOSE_OUTPUT=y

CONFIG_EXTERNAL_LIBC=y
CONFIG_USERSPACE=n

CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_BT=n
CONFIG_HWINFO=n
CONFIG_SENSOR=n
CONFIG_GPIO=n
CONFIG_I2C=n
CONFIG_SPI=n
CONFIG_PM=n

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=2
