# Bluetooth Mesh configuration - Optimized for ultra-low power
# This file contains all mesh-specific configurations
# Include this file when you want to enable mesh functionality

CONFIG_BT_MESH=y
CONFIG_BT_MESH_RELAY=n
CONFIG_BT_MESH_FRIEND=n
CONFIG_BT_MESH_LOW_POWER=y
CONFIG_BT_MESH_LPN_AUTO=y
CONFIG_BT_MESH_LPN_ESTABLISHMENT=y

# Ultra-low power mesh timing (extend battery life to weeks/months)
# Maximum allowed poll timeout (244735ms ≈ 4 minutes)
CONFIG_BT_MESH_LPN_POLL_TIMEOUT=244735
# 200ms receive delay (within valid range)
CONFIG_BT_MESH_LPN_RECV_DELAY=200
# Maximum initial poll timeout (300ms)
CONFIG_BT_MESH_LPN_INIT_POLL_TIMEOUT=300

# Reduce mesh overhead for sensors
# Reduce max segments (was 6)
CONFIG_BT_MESH_TX_SEG_MAX=3
CONFIG_BT_MESH_PB_GATT=y
CONFIG_BT_MESH_GATT_PROXY=y
CONFIG_BT_MESH_PROXY_USE_DEVICE_NAME=y
CONFIG_BT_MESH_DK_PROV=y
CONFIG_BT_MESH_MODEL_KEY_COUNT=2

# Bluetooth Mesh Security Features
CONFIG_BT_MESH_FRIEND_ENABLED=n
CONFIG_BT_MESH_PROVISIONER=n
CONFIG_BT_MESH_PB_ADV=y
# Enhanced security for production
CONFIG_BT_MESH_IV_UPDATE_TEST=n
# Enable OOB authentication support
CONFIG_BT_MESH_ECDH_P256_CMAC_AES128_AES_CCM=y
CONFIG_BT_MESH_ECDH_P256_HMAC_SHA256_AES_CCM=y

# Bluetooth Mesh models
CONFIG_BT_MESH_SENSOR_SRV=y
CONFIG_BT_MESH_SENSOR_SRV_SENSORS_MAX=6

# Model extension configuration - match actual usage (2 extensions used)
CONFIG_BT_MESH_MODEL_EXTENSION_LIST_SIZE=2

# Stack sizes for mesh
CONFIG_BT_MESH_ADV_STACK_SIZE=1024
CONFIG_BT_RX_STACK_SIZE=3584

# Reduce mesh message config for power savings
# Reduce from 20
CONFIG_BT_MESH_ACCESS_DELAYABLE_MSG_CHUNK_COUNT=10
CONFIG_BT_MESH_TX_SEG_MSG_COUNT=1
# Reduce from 3
CONFIG_BT_MESH_ACCESS_DELAYABLE_MSG_COUNT=2

# Additional power optimizations
# Scan latency for LPN
CONFIG_BT_MESH_LPN_SCAN_LATENCY=30
# Reduce message cache
CONFIG_BT_MESH_MSG_CACHE_SIZE=2
# Single subnet only
CONFIG_BT_MESH_SUBNET_COUNT=1
# Single app key
CONFIG_BT_MESH_APP_KEY_COUNT=1

# Logging optimization
CONFIG_BT_MESH_LOG_LEVEL_WRN=y
