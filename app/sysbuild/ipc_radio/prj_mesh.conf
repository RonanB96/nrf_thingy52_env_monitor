# Ultra-low power memory configuration
CONFIG_HEAP_MEM_POOL_SIZE=4096        # Reduce from 8KB to 4KB for power savings
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024  # Reduce from 2KB to 1KB

CONFIG_MBOX=y
CONFIG_IPC_SERVICE=y


CONFIG_BT=y
CONFIG_BT_HCI_RAW=y
CONFIG_BT_MAX_CONN=1          # Reduce from 16 to 1 (sensors don't need many connections)

# Optimize Bluetooth buffers for low power mesh operation
CONFIG_BT_BUF_EVT_RX_COUNT=4     # Reduce event RX buffers (was commented)
CONFIG_BT_BUF_EVT_RX_SIZE=68     # Smaller event buffer size for mesh
CONFIG_BT_BUF_ACL_RX_SIZE=27     # Minimal ACL RX for mesh advertising
CONFIG_BT_BUF_ACL_TX_SIZE=27     # Minimal ACL TX for mesh advertising
CONFIG_BT_BUF_CMD_TX_SIZE=65     # Minimal command buffer size

# Copy controller configuration from main app prj.conf - ENABLE SECURITY
CONFIG_BT_CTLR_LE_ENC=y      # ✅ Enable link layer encryption
CONFIG_BT_CTLR_CHAN_SEL_2=n  # Keep disabled for power savings
CONFIG_BT_CTLR_MIN_USED_CHAN=n # Keep disabled for power savings
CONFIG_BT_CTLR_PRIVACY=y     # ✅ Enable privacy features

# Enables the extended advertising API support and the necessary amount of advertising sets
# in the Bluetooth controller on the network core required by the Bluetooth Mesh.
CONFIG_BT_EXT_ADV=y
CONFIG_BT_EXT_ADV_MAX_ADV_SET=2  # Reduce from 5 to 2 (mesh + provisioning)

# Ultra-low power Bluetooth controller optimizations
CONFIG_BT_CTLR_LOW_LAT=n         # Disable low latency for power savings
CONFIG_BT_CTLR_FAST_ENC=n        # Disable fast encryption for power savings
CONFIG_BT_CTLR_DATA_LEN_MAX=27   # Minimal data length for mesh packets
CONFIG_BT_CTLR_PHY_2M=n          # Disable 2Mbps PHY for power savings
CONFIG_BT_CTLR_PHY_CODED=n       # Disable coded PHY for power savings

# Power management for radio core
CONFIG_PM_DEVICE=y               # Enable device power management

CONFIG_IPC_RADIO_BT=y
CONFIG_IPC_RADIO_BT_HCI_IPC=y
