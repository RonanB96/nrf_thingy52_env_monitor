# Ultra-low power memory configuration for BLE advertising
CONFIG_HEAP_MEM_POOL_SIZE=2048        # Reduce from 4KB to 2KB (less overhead for advertising)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=512   # Reduce from 1KB to 512B (advertising needs less)

CONFIG_MBOX=y
CONFIG_IPC_SERVICE=y

CONFIG_BT=y
CONFIG_BT_HCI_RAW=y
CONFIG_BT_MAX_CONN=1          # Single connection for BLE advertising

# Optimize Bluetooth buffers for BLE advertising
CONFIG_BT_BUF_EVT_RX_COUNT=2     # Minimal event RX buffers for advertising
CONFIG_BT_BUF_EVT_RX_SIZE=68     # Standard event buffer size
CONFIG_BT_BUF_ACL_RX_SIZE=27     # Minimal ACL RX for simple advertising
CONFIG_BT_BUF_ACL_TX_SIZE=27     # Minimal ACL TX for simple advertising
CONFIG_BT_BUF_CMD_TX_SIZE=65     # Standard command buffer size

# Copy controller configuration from main app prj.conf - ENABLE SECURITY
CONFIG_BT_CTLR_LE_ENC=y      # ✅ Enable link layer encryption
CONFIG_BT_CTLR_CHAN_SEL_2=n  # Keep disabled for power savings
CONFIG_BT_CTLR_MIN_USED_CHAN=n # Keep disabled for power savings
CONFIG_BT_CTLR_PRIVACY=y     # ✅ Enable privacy features

# Extended advertising for BLE advertising
CONFIG_BT_EXT_ADV=y
CONFIG_BT_EXT_ADV_MAX_ADV_SET=1  # Only need 1 advertising set for sensor data

# Ultra-low power Bluetooth controller optimizations
CONFIG_BT_CTLR_LOW_LAT=n         # Disable low latency for power savings
CONFIG_BT_CTLR_FAST_ENC=n        # Disable fast encryption for power savings
CONFIG_BT_CTLR_DATA_LEN_MAX=27   # Minimal data length for advertising packets
CONFIG_BT_CTLR_PHY_2M=n          # Disable 2Mbps PHY for power savings
CONFIG_BT_CTLR_PHY_CODED=n       # Disable coded PHY for power savings

# Power management for radio core
CONFIG_PM_DEVICE=y               # Enable device power management

CONFIG_IPC_RADIO_BT=y
CONFIG_IPC_RADIO_BT_HCI_IPC=y
