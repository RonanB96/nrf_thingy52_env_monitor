name: Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        path: nrf_thingy52_env_monitor
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build gperf ccache dfu-util \
          device-tree-compiler wget python3-dev python3-venv python3-tk \
          xz-utils file make gcc gcc-multilib g++-multilib libc6-dev-i386 \
          lcov gcovr
        
    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          pip-${{ runner.os }}-
        
    - name: Set up Python environment
      run: |
        cd nrf_thingy52_env_monitor
        python3 -m venv .venv
        source .venv/bin/activate
        pip install west
        pip install intelhex pyelftools pykwalify ruamel.yaml python-dateutil
        
    - name: Initialize west workspace
      run: |
        cd nrf_thingy52_env_monitor
        source .venv/bin/activate
        # Clear any previous west configuration that might force Zephyr SDK
        west config build.cmake-args "" || true
        west update
        
    - name: Build tests with coverage
      run: |
        cd nrf_thingy52_env_monitor
        source .venv/bin/activate
        export ZEPHYR_TOOLCHAIN_VARIANT=host
        echo "Building tests with coverage enabled"
        west build app/tests -b native_sim/native/64 -p always -- -DCONFIG_COVERAGE=y
        
    - name: Run tests
      run: |
        cd nrf_thingy52_env_monitor
        source .venv/bin/activate
        export ZEPHYR_TOOLCHAIN_VARIANT=host
        echo "Running tests and collecting coverage data"
        # Run the test executable directly
        ./build/tests/zephyr/zephyr.exe > test_output.log 2>&1 || echo "Test execution completed"
        cat test_output.log
        
    - name: Generate coverage reports
      run: |
        cd nrf_thingy52_env_monitor
        echo "Generating coverage reports..."
        
        # Create coverage directory
        mkdir -p coverage
        
        # List coverage data files for debugging
        echo "Coverage data files found:"
        find build/tests -name "*.gcno" -o -name "*.gcda" | head -20
        
        # Check if any coverage files exist
        if [ $(find build/tests -name "*.gcno" -o -name "*.gcda" | wc -l) -eq 0 ]; then
          echo "No coverage files found. Checking build directory structure..."
          find build -name "*.gcno" -o -name "*.gcda" | head -10
          echo "Checking CMakeFiles for coverage objects..."
          find build -path "*/CMakeFiles/*.dir/*.gcno" | head -10
        fi
        
        # Generate HTML coverage report with lcov
        lcov --capture --directory build/tests --output-file coverage/coverage.info \
          --rc lcov_branch_coverage=1 || echo "LCOV collection completed with issues"
        
        # Check if coverage.info was created and has content
        if [ -f coverage/coverage.info ] && [ -s coverage/coverage.info ]; then
          echo "Coverage data collected successfully"
          
          # Filter out system headers, keep only test source files
          lcov --extract coverage/coverage.info \
            '*/app/tests/src/*' \
            --output-file coverage/coverage_filtered.info \
            --rc lcov_branch_coverage=1 || echo "LCOV filtering completed"
          
          # Generate HTML report
          genhtml coverage/coverage_filtered.info --output-directory coverage/html \
            --title "Nordic Thingy:52 Test Coverage" \
            --show-details --legend \
            --rc lcov_branch_coverage=1 || echo "HTML generation completed"
        else
          echo "No coverage data collected"
        fi
        
        # Generate JSON coverage report with gcovr for better CI integration
        gcovr --root . \
          --filter '.*app/tests/src/.*\.c$' \
          --exclude '.*app/tests/src/mocks/.*' \
          --json coverage/coverage.json \
          --html coverage/coverage.html \
          --txt coverage/coverage.txt \
          build/tests || echo "gcovr generation completed"
        
        # Display coverage summary
        if [ -f coverage/coverage.txt ]; then
          echo "Coverage Summary:"
          cat coverage/coverage.txt
        else
          echo "No coverage.txt found, listing available files:"
          ls -la coverage/ || echo "No coverage directory found"
          echo "Test executable info:"
          ls -la build/tests/zephyr/ | grep -E "(zephyr\.exe|zephyr\.elf)" || echo "No test executable found"
        fi
        
    - name: Coverage Summary Comment
      run: |
        cd nrf_thingy52_env_monitor
        echo "## 📊 Test Coverage Report" >> coverage_summary.md
        echo "" >> coverage_summary.md
        if [ -f coverage/coverage.txt ]; then
          echo '```' >> coverage_summary.md
          cat coverage/coverage.txt >> coverage_summary.md
          echo '```' >> coverage_summary.md
        else
          echo "Coverage data not available" >> coverage_summary.md
        fi
        echo "" >> coverage_summary.md
        echo "Full coverage report available in artifacts." >> coverage_summary.md
        
    - name: Upload test results and coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-and-coverage
        path: |
          nrf_thingy52_env_monitor/build/tests/zephyr/zephyr.elf
          nrf_thingy52_env_monitor/test_output.log
          nrf_thingy52_env_monitor/coverage/
          nrf_thingy52_env_monitor/coverage_summary.md
        
    - name: Check test output
      run: |
        cd nrf_thingy52_env_monitor
        # Parse test output for pass/fail status
        if grep -q "PROJECT EXECUTION SUCCESSFUL" test_output.log; then
          echo "✅ All tests passed!"
        else
          echo "❌ Tests failed!"
          exit 1
        fi