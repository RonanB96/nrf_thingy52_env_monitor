name: Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        path: nrf_thingy52_env_monitor
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build gperf ccache dfu-util \
          device-tree-compiler wget python3-dev python3-venv python3-tk \
          xz-utils file make gcc gcc-multilib g++-multilib libc6-dev-i386
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          pip-${{ runner.os }}-
        
    - name: Set up Python environment
      run: |
        cd nrf_thingy52_env_monitor
        python3 -m venv .venv
        source .venv/bin/activate
        pip install west
        pip install intelhex pyelftools pykwalify ruamel.yaml python-dateutil
        
    - name: Initialize west workspace
      run: |
        cd nrf_thingy52_env_monitor
        source .venv/bin/activate
        # Clear any previous west configuration that might force Zephyr SDK
        west config build.cmake-args "" || true
        west update
        
    - name: Build tests
      run: |
        cd nrf_thingy52_env_monitor
        source .venv/bin/activate
        export ZEPHYR_TOOLCHAIN_VARIANT=host
        echo "Using host toolchain for native_sim build"
        west build app/tests -b native_sim -p always
        
    - name: Run tests
      run: |
        cd nrf_thingy52_env_monitor
        source .venv/bin/activate
        export ZEPHYR_TOOLCHAIN_VARIANT=host
        west build -t run
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: nrf_thingy52_env_monitor/build/zephyr/zephyr.elf
        
    - name: Check test output
      run: |
        cd nrf_thingy52_env_monitor
        # Parse test output for pass/fail status
        # This would need to be customized based on actual test output format
        if grep -q "PROJECT EXECUTION SUCCESSFUL" build/zephyr/zephyr.log; then
          echo "Tests passed!"
        else
          echo "Tests failed!"
          exit 1
        fi