name: CI Unit Tests

on:
    push:
        branches: [ main, develop ]
        paths:
            - "app/tests/**"
            - "app/src/**"
            - "app/include/**"
            - "app/prj.conf"
            - "app/Kconfig*"
            - ".github/workflows/ci-unit-tests.yml"
    pull_request:
        branches: [ main, develop ]
        paths:
            - "app/tests/**"
            - "app/src/**"
            - "app/include/**"
            - "app/prj.conf"
            - "app/Kconfig*"
            - ".github/workflows/ci-unit-tests.yml"

concurrency:
    group: ci-tests-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    unit-tests:
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/zephyrproject-rtos/ci-repo-cache:v0.27.4.20241026

        defaults:
            run:
                shell: bash

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Set up Python tools
              run: |
                  python3 -m pip install --upgrade pip
                  python3 -m pip install west

            - name: Sync west modules (shallow)
              run: |
                  west config build.cmake-args "" || true
                  west update --fetch smart --narrow --fetch-opt=--depth=1

            - name: Build native_sim tests
              run: |
                  source modules/zephyr/zephyr-env.sh
                  export ZEPHYR_TOOLCHAIN_VARIANT=host
                  west build app/tests -d app/tests/build -b native_sim -p always

            - name: Run tests
              run: |
                  ./app/tests/build/zephyr/zephyr.exe > test_output.log 2>&1
                  cat test_output.log
                  grep -q "PROJECT EXECUTION SUCCESSFUL" test_output.log

            - name: Upload test outputs
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: unit-test-results
                  path: |
                      app/tests/build/zephyr/zephyr.elf
                      test_output.log
