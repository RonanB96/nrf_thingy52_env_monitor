name: CI Static Analysis

on:
    push:
        branches: [ main, develop ]
        paths:
            - ".github/workflows/**"
            - ".clang-format"
            - ".checkpatch.conf"
            - ".clang-tidy"
            - ".codechecker.json"
            - ".codechecker.skip"
            - "app/**"
            - ".github/workflows/ci-static-analysis.yml"
    pull_request:
        branches: [ main, develop ]
        paths:
            - ".github/workflows/**"
            - ".clang-format"
            - ".checkpatch.conf"
            - ".clang-tidy"
            - ".codechecker.json"
            - ".codechecker.skip"
            - "app/**"
            - ".github/workflows/ci-static-analysis.yml"

concurrency:
    group: ci-static-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    format-and-lint:
        runs-on: ubuntu-latest

        defaults:
            run:
                shell: bash

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Show tool versions
              run: |
                  clang-format --version
                  perl --version | head -n 2

            - name: Check C formatting
              run: |
                  mapfile -t files < <(find app/src app/include app/tests/src -type f \( -name '*.c' -o -name '*.h' \))
                  if [[ ${#files[@]} -eq 0 ]]; then
                    echo "No C sources found"
                    exit 0
                  fi
                  clang-format --dry-run --Werror "${files[@]}"

            - name: Run checkpatch on changed range
              run: |
                  if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                    git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
                    range="origin/${{ github.base_ref }}...HEAD"
                  else
                    if git rev-parse HEAD~1 >/dev/null 2>&1; then
                      range="HEAD~1...HEAD"
                    else
                      echo "Single-commit branch detected, skipping checkpatch range check"
                      exit 0
                    fi
                  fi

                  perl modules/zephyr/scripts/checkpatch.pl \
                    --git "$range" \
                    --show-types \
                    --strict \
                    --max-line-length=100

            - name: Lint workflow YAML
              run: |
                  pip install yamllint
                  yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable, document-start: disable}}" .github/workflows

            - name: Lint workflow logic
              uses: reviewdog/action-actionlint@v1
              with:
                  fail_level: error

